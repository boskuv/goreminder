paths:
  /api/v1/messengerRelatedUsers:
    get:
      description: Retrieves a messenger-related user by chatID, messengerUserID,
        userID and messengerID
      parameters:
      - description: Chat ID
        in: query
        name: chat_id
        required: true
        type: string
      - description: Messenger User ID
        in: query
        name: messenger_user_id
        required: true
        type: string
      - description: User ID
        in: query
        name: user_id
        type: integer
      - description: Messenger ID
        in: query
        name: messenger_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessengerRelatedUser'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get messenger-related user by chatID, messengerUserID, userID and messengerID
      tags:
      - Messengers
    post:
      consumes:
      - application/json
      description: Сreates a new messenger-related user
      parameters:
      - description: MessengerRelatedUser to create
        in: body
        name: messenger
        required: true
        schema:
          $ref: '#/definitions/models.MessengerRelatedUser'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Сreate a new messenger-related user
      tags:
      - Messengers
  /api/v1/messengerRelatedUsers/{messenger_user_id}/user:
    get:
      description: Retrieves a userID by messengerUserID
      parameters:
      - description: Messenger UserID
        in: path
        name: messenger_user_id
        required: true
