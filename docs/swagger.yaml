definitions:
  dto.CreateMessengerRelatedUserRequest:
    properties:
      chat_id:
        example: "-1001234567890"
        type: string
      messenger_id:
        example: 1
        type: integer
      messenger_user_id:
        example: "123456789"
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - chat_id
    - messenger_id
    - messenger_user_id
    - user_id
    type: object
  dto.CreateMessengerRequest:
    properties:
      name:
        example: telegram
        type: string
    required:
    - name
    type: object
  dto.CreateTaskRequest:
    properties:
      cron_expression:
        example: 0 9 * * *
        type: string
      description:
        example: Write comprehensive documentation for the API
        type: string
      finish_date:
        example: "2024-01-20T18:00:00Z"
        type: string
      messenger_related_user_id:
        example: 123
        type: integer
      start_date:
        example: "2024-01-15T10:00:00Z"
        type: string
      status:
        enum:
        - pending
        - scheduled
        - done
        - rescheduled
        - postponed
        - deleted
        example: pending
        type: string
      title:
        example: Complete project documentation
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - title
    - user_id
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      language_code:
        example: en
        type: string
      name:
        example: John Doe
        type: string
      password_hash:
        example: $2a$10$N9qo8uLOickgx2ZMRZoMye
        type: string
      role:
        enum:
        - user
        - admin
        example: user
        type: string
      timezone:
        example: UTC
        type: string
    required:
    - email
    - name
    - password_hash
    type: object
  dto.MessengerRelatedUserResponse:
    properties:
      chat_id:
        example: "-1001234567890"
        type: string
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      messenger_id:
        example: 1
        type: integer
      messenger_user_id:
        example: "123456789"
        type: string
      updated_at:
        description: ISO 8601 format
        example: "2024-01-15T10:00:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.MessengerResponse:
    properties:
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      name:
        example: telegram
        type: string
    type: object
  dto.PaginatedMessengerRelatedUsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.MessengerRelatedUserResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedMessengersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.MessengerResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedTasksResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.TaskResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedUsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginationResponse:
    properties:
      page:
        example: 1
        type: integer
      page_size:
        example: 50
        type: integer
      total_count:
        example: 500
        type: integer
      total_pages:
        example: 10
        type: integer
    type: object
  dto.QueueTaskRequest:
    properties:
      action:
        enum:
        - schedule
        - delete
        example: schedule
        type: string
      queue_name:
        example: celery
        type: string
      task_id:
        example: 1
        type: integer
    required:
    - action
    - queue_name
    - task_id
    type: object
  dto.TaskHistoryResponse:
    properties:
      action:
        enum:
        - created
        - updated
        - deleted
        - status_changed
        example: created
        type: string
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      new_value:
        additionalProperties: true
        type: object
      old_value:
        additionalProperties: true
        type: object
      task_id:
        example: 1
        type: integer
      user_id:
        example: 1
        type: integer
    type: object
  dto.TaskResponse:
    properties:
      created_at:
        example: "2024-01-10T08:00:00Z"
        type: string
      cron_expression:
        example: 0 9 * * *
        type: string
      description:
        example: Write comprehensive documentation for the API
        type: string
      finish_date:
        example: "2024-01-20T18:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      messenger_related_user_id:
        example: 123
        type: integer
      start_date:
        example: "2024-01-15T10:00:00Z"
        type: string
      status:
        enum:
        - pending
        - scheduled
        - done
        - rescheduled
        - postponed
        - deleted
        example: pending
        type: string
      title:
        example: Complete project documentation
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.UpdateTaskRequest:
    properties:
      cron_expression:
        example: 0 9 * * *
        type: string
      description:
        example: Updated task description
        type: string
      finish_date:
        example: "2024-01-20T18:00:00Z"
        type: string
      start_date:
        example: "2024-01-15T10:00:00Z"
        type: string
      status:
        enum:
        - pending
        - scheduled
        - done
        - rescheduled
        - postponed
        - deleted
        example: done
        type: string
      title:
        example: Updated task title
        type: string
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      language_code:
        example: ru
        type: string
      name:
        example: Jane Doe
        type: string
      password_hash:
        example: $2a$10$N9qo8uLOickgx2ZMRZoMye
        type: string
      role:
        enum:
        - user
        - admin
        example: admin
        type: string
      timezone:
        example: America/New_York
        type: string
    type: object
  dto.UserResponse:
    properties:
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      email:
        example: john.doe@example.com
        type: string
      id:
        example: 1
        type: integer
      language_code:
        example: en
        type: string
      name:
        example: John Doe
        type: string
      role:
        enum:
        - user
        - admin
        example: user
        type: string
      timezone:
        example: UTC
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/messengerRelatedUsers:
    get:
      description: Retrieves a messenger-related user by chatID, messengerUserID,
        userID and messengerID
      parameters:
      - description: Chat ID
        in: query
        name: chat_id
        required: true
        type: string
      - description: Messenger User ID
        in: query
        name: messenger_user_id
        required: true
        type: string
      - description: User ID
        in: query
        name: user_id
        type: integer
      - description: Messenger ID
        in: query
        name: messenger_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Messenger-related user details
          schema:
            $ref: '#/definitions/dto.MessengerRelatedUserResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Messenger-related user not found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get messenger-related user by chatID, messengerUserID, userID and messengerID
      tags:
      - Messengers
    post:
      consumes:
      - application/json
      description: Creates a new messenger-related user
      parameters:
      - description: MessengerRelatedUser to create
        in: body
        name: messenger
        required: true
        schema:
          $ref: '#/definitions/dto.CreateMessengerRelatedUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created messenger-related user ID
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new messenger-related user
      tags:
      - Messengers
  /api/v1/messengerRelatedUsers/{messenger_user_id}/user:
    get:
      description: Retrieves a userID by messengerUserID
      parameters:
      - description: Messenger UserID
        in: path
        name: messenger_user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User ID
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a userID by messengerUserID
      tags:
      - Messengers
  /api/v1/messengerRelatedUsers/all:
    get:
      description: Retrieves all messenger-related users with pagination and ordering
      parameters:
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - default: 50
        description: 'Page size (default: 50)'
        in: query
        name: page_size
        type: integer
      - default: created_at DESC
        description: 'Order by field (default: created_at DESC)'
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of messenger-related users
          schema:
            $ref: '#/definitions/dto.PaginatedMessengerRelatedUsersResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all messenger-related users
      tags:
      - Messengers
  /api/v1/messengers:
    get:
      description: Retrieves all messengers with pagination and ordering
      parameters:
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - default: 50
        description: 'Page size (default: 50)'
        in: query
        name: page_size
        type: integer
      - default: created_at DESC
        description: 'Order by field (default: created_at DESC)'
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of messengers
          schema:
            $ref: '#/definitions/dto.PaginatedMessengersResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all messengers
      tags:
      - Messengers
    post:
      consumes:
      - application/json
      description: Creates a new messenger type
      parameters:
      - description: Messenger to create
        in: body
        name: messenger
        required: true
        schema:
          $ref: '#/definitions/dto.CreateMessengerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created messenger ID
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new messenger type
      tags:
      - Messengers
  /api/v1/messengers/{messenger_id}:
    get:
      description: Retrieves a messenger by its ID
      parameters:
      - description: Messenger ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Messenger details
          schema:
            $ref: '#/definitions/dto.MessengerResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Messenger not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get messenger by ID
      tags:
      - Messengers
  /api/v1/messengers/by-name/{messenger_name}:
    get:
      description: Retrieves a messenger ID by its name
      parameters:
      - description: Messenger name
        in: path
        name: messenger_name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Messenger ID
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Messenger not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get messenger ID by name
      tags:
      - Messengers
  /api/v1/tasks:
    get:
      description: Retrieves all tasks with pagination, ordering, and filtering (by
        status, start_date_from, start_date_to, user_id)
      parameters:
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - default: 50
        description: 'Page size (default: 50)'
        in: query
        name: page_size
        type: integer
      - default: created_at DESC
        description: 'Order by field (default: created_at DESC)'
        in: query
        name: order_by
        type: string
      - description: Filter by status (pending, scheduled, done, rescheduled, postponed,
          deleted)
        in: query
        name: status
        type: string
      - description: Filter by start_date from (RFC3339 format, inclusive)
        in: query
        name: start_date_from
        type: string
      - description: Filter by start_date to (RFC3339 format, inclusive)
        in: query
        name: start_date_to
        type: string
      - description: Filter by user_id
        in: query
        name: user_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of tasks
          schema:
            $ref: '#/definitions/dto.PaginatedTasksResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all tasks
      tags:
      - Tasks
    post:
      consumes:
      - application/json
      description: Creates a new task and associates it with a user
      parameters:
      - description: Task to create
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/dto.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created task ID
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new task
      tags:
      - Tasks
  /api/v1/tasks/{id}:
    delete:
      consumes:
      - application/json
      description: Marks a task as deleted by its ID (soft delete)
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Soft delete a task
      tags:
      - Tasks
    get:
      description: Retrieves a task by its ID
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Task details
          schema:
            $ref: '#/definitions/dto.TaskResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get task by ID
      tags:
      - Tasks
    put:
      consumes:
      - application/json
      description: Updates a task by its ID
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task update details
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated task
          schema:
            $ref: '#/definitions/dto.TaskResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a task
      tags:
      - Tasks
  /api/v1/tasks/{id}/done:
    post:
      consumes:
      - application/json
      description: Marks a task as done, updates it in the database, and queues worker.delete_task
        in a transactional manner. If queueing fails, the database update is rolled
        back.
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Task marked as done successfully
          schema:
            $ref: '#/definitions/dto.TaskResponse'
        "400":
          description: Invalid task ID parameter
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error or transaction failure
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Mark task as done
      tags:
      - Tasks
  /api/v1/tasks/{id}/history:
    get:
      description: Retrieves history entries for a specific task
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Task history entries
          schema:
            items:
              $ref: '#/definitions/dto.TaskHistoryResponse'
            type: array
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get task history by task ID
      tags:
      - Tasks
  /api/v1/tasks/queue:
    post:
      consumes:
      - application/json
      description: Send task to queue with predefined action
      parameters:
      - description: Task to enqueue
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/dto.QueueTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Task ID
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Task not found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Send task to queue
      tags:
      - Tasks
  /api/v1/users:
    get:
      description: Retrieves all users with pagination and ordering
      parameters:
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - default: 50
        description: 'Page size (default: 50)'
        in: query
        name: page_size
        type: integer
      - default: created_at DESC
        description: 'Order by field (default: created_at DESC)'
        in: query
        name: order_by
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of users
          schema:
            $ref: '#/definitions/dto.PaginatedUsersResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Creates a new user in the system
      parameters:
      - description: User to create
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created user ID
          schema:
            additionalProperties:
              type: integer
            type: object
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new user
      tags:
      - Users
  /api/v1/users/{user_id}:
    delete:
      consumes:
      - application/json
      description: Marks a user as deleted by its ID (soft delete)
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "400":
          description: Bad request
          schema:
            additionalProperties:
