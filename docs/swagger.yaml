definitions:
  dto.BacklogResponse:
    properties:
      completed_at:
        example: "2024-01-15T10:00:00Z"
        type: string
      created_at:
        example: "2024-01-10T08:00:00Z"
        type: string
      description:
        example: Add user authentication
        type: string
      id:
        example: 1
        type: integer
      messenger_related_user_id:
        example: 123
        type: integer
      title:
        example: Implement new feature
        type: string
      updated_at:
        example: "2024-01-10T08:00:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.BatchCreateResponse:
    properties:
      count:
        example: 3
        type: integer
      ids:
        items:
          type: integer
        type: array
    type: object
  dto.CreateBacklogRequest:
    properties:
      description:
        example: Add user authentication
        type: string
      messenger_related_user_id:
        example: 123
        type: integer
      title:
        example: Implement new feature
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - title
    - user_id
    type: object
  dto.CreateBacklogsBatchRequest:
    properties:
      items:
        example: |-
          Item 1
          Item 2
          Item 3
        type: string
      messenger_related_user_id:
        example: 123
        type: integer
      separator:
        example: |2+

        type: string
      user_id:
        example: 1
        type: integer
    required:
    - items
    - user_id
    type: object
  dto.CreateDigestSettingsRequest:
    properties:
      enabled:
        example: true
        type: boolean
      messenger_related_user_id:
        example: 123
        type: integer
      user_id:
        example: 1
        type: integer
      weekday_time:
        description: 'Format: HH:MM'
        example: "07:00"
        type: string
      weekend_time:
        description: 'Format: HH:MM'
        example: "10:00"
        type: string
    required:
    - user_id
    - weekday_time
    - weekend_time
    type: object
  dto.CreateMessengerRelatedUserRequest:
    properties:
      chat_id:
        example: "-1001234567890"
        type: string
      messenger_id:
        example: 1
        type: integer
      messenger_user_id:
        example: "123456789"
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - chat_id
    - messenger_id
    - messenger_user_id
    - user_id
    type: object
  dto.CreateMessengerRequest:
    properties:
      name:
        example: telegram
        type: string
    required:
    - name
    type: object
  dto.CreateResponse:
    properties:
      id:
        example: 1
        type: integer
    type: object
  dto.CreateTargetRequest:
    properties:
      description:
        example: Master Go programming language
        type: string
      messenger_related_user_id:
        example: 123
        type: integer
      title:
        example: Learn Go programming
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - title
    - user_id
    type: object
  dto.CreateTaskRequest:
    properties:
      cron_expression:
        example: 0 9 * * *
        type: string
      description:
        example: Write comprehensive documentation for the API
        type: string
      finish_date:
        example: "2024-01-20T18:00:00Z"
        type: string
      messenger_related_user_id:
        example: 123
        type: integer
      requires_confirmation:
        example: true
        type: boolean
      start_date:
        example: "2024-01-15T10:00:00Z"
        type: string
      status:
        enum:
        - pending
        - scheduled
        - done
        - rescheduled
        - postponed
        - deleted
        example: pending
        type: string
      title:
        example: Complete project documentation
        type: string
      user_id:
        example: 1
        type: integer
    required:
    - title
    - user_id
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        example: john.doe@example.com
        type: string
      language_code:
        example: en
        type: string
      name:
        example: John Doe
        type: string
      password_hash:
        example: $2a$10$N9qo8uLOickgx2ZMRZoMye
        type: string
      role:
        enum:
        - user
        - admin
        example: user
        type: string
      timezone:
        example: UTC
        type: string
    required:
    - name
    type: object
  dto.DigestResponse:
    properties:
      chat_id:
        example: "123"
        type: string
      completed_backlogs_count:
        example: 5
        type: integer
      messenger_related_user_id:
        example: 123
        type: integer
      start_date_from:
        example: "2024-01-01T00:00:00Z"
        type: string
      start_date_to:
        example: "2024-01-07T23:59:59Z"
        type: string
      targets:
        items:
          $ref: '#/definitions/dto.TargetResponse'
        type: array
      tasks:
        items:
          $ref: '#/definitions/dto.TaskResponse'
        type: array
      timezone:
        example: UTC
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.DigestSettingsResponse:
    properties:
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      enabled:
        example: true
        type: boolean
      id:
        example: 1
        type: integer
      messenger_related_user_id:
        example: 123
        type: integer
      updated_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      user_id:
        example: 1
        type: integer
      weekday_time:
        example: "07:00"
        type: string
      weekend_time:
        example: "10:00"
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      message:
        example: error message
        type: string
    type: object
  dto.IDResponse:
    properties:
      id:
        example: 1
        type: integer
    type: object
  dto.MessengerRelatedUserResponse:
    properties:
      chat_id:
        example: "-1001234567890"
        type: string
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      messenger_id:
        example: 1
        type: integer
      messenger_user_id:
        example: "123456789"
        type: string
      updated_at:
        description: ISO 8601 format
        example: "2024-01-15T10:00:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.MessengerResponse:
    properties:
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      name:
        example: telegram
        type: string
    type: object
  dto.PaginatedBacklogsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.BacklogResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedDigestSettingsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.DigestSettingsResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedMessengerRelatedUsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.MessengerRelatedUserResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedMessengersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.MessengerResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedTargetsResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.TargetResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedTasksResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.TaskResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginatedUsersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      pagination:
        $ref: '#/definitions/dto.PaginationResponse'
    type: object
  dto.PaginationResponse:
    properties:
      page:
        example: 1
        type: integer
      page_size:
        example: 50
        type: integer
      total_count:
        example: 500
        type: integer
      total_pages:
        example: 10
        type: integer
    type: object
  dto.QueueTaskRequest:
    properties:
      action:
        enum:
        - schedule
        - delete
        example: schedule
        type: string
      queue_name:
        example: celery
        type: string
      task_id:
        example: 1
        type: integer
    required:
    - action
    - queue_name
    - task_id
    type: object
  dto.TargetResponse:
    properties:
      completed_at:
        example: "2024-01-15T10:00:00Z"
        type: string
      created_at:
        example: "2024-01-10T08:00:00Z"
        type: string
      description:
        example: Master Go programming language
        type: string
      id:
        example: 1
        type: integer
      messenger_related_user_id:
        example: 123
        type: integer
      title:
        example: Learn Go programming
        type: string
      updated_at:
        example: "2024-01-10T08:00:00Z"
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.TaskCreateResponse:
    properties:
      child_id:
        example: 2
        type: integer
      id:
        example: 1
        type: integer
    type: object
  dto.TaskHistoryResponse:
    properties:
      action:
        enum:
        - created
        - updated
        - deleted
        - status_changed
        example: created
        type: string
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      new_value:
        additionalProperties: true
        type: object
      old_value:
        additionalProperties: true
        type: object
      task_id:
        example: 1
        type: integer
      user_id:
        example: 1
        type: integer
    type: object
  dto.TaskResponse:
    properties:
      created_at:
        example: "2024-01-10T08:00:00Z"
        type: string
      cron_expression:
        example: 0 9 * * *
        type: string
      description:
        example: Write comprehensive documentation for the API
        type: string
      finish_date:
        example: "2024-01-20T18:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      messenger_related_user_id:
        example: 123
        type: integer
      parent_id:
        example: 5
        type: integer
      requires_confirmation:
        example: true
        type: boolean
      start_date:
        example: "2024-01-15T10:00:00Z"
        type: string
      status:
        enum:
        - pending
        - scheduled
        - done
        - rescheduled
        - postponed
        - deleted
        example: pending
        type: string
      title:
        example: Complete project documentation
        type: string
      user_id:
        example: 1
        type: integer
    type: object
  dto.UpdateBacklogRequest:
    properties:
      completed_at:
        example: "2024-01-15T10:00:00Z"
        type: string
      description:
        example: Updated backlog description
        type: string
      title:
        example: Updated backlog title
        type: string
    type: object
  dto.UpdateDigestSettingsRequest:
    properties:
      enabled:
        example: true
        type: boolean
      messenger_related_user_id:
        example: 123
        type: integer
      weekday_time:
        description: 'Format: HH:MM'
        example: "08:00"
        type: string
      weekend_time:
        description: 'Format: HH:MM'
        example: "11:00"
        type: string
    type: object
  dto.UpdateTargetRequest:
    properties:
      completed_at:
        example: "2024-01-15T10:00:00Z"
        type: string
      description:
        example: Updated target description
        type: string
      title:
        example: Updated target title
        type: string
    type: object
  dto.UpdateTaskRequest:
    properties:
      cron_expression:
        example: 0 9 * * *
        type: string
      description:
        example: Updated task description
        type: string
      finish_date:
        example: "2024-01-20T18:00:00Z"
        type: string
      requires_confirmation:
        example: true
        type: boolean
      start_date:
        example: "2024-01-15T10:00:00Z"
        type: string
      status:
        enum:
        - pending
        - scheduled
        - done
        - rescheduled
        - postponed
        - deleted
        example: done
        type: string
      title:
        example: Updated task title
        type: string
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      language_code:
        example: ru
        type: string
      name:
        example: Jane Doe
        type: string
      password_hash:
        example: $2a$10$N9qo8uLOickgx2ZMRZoMye
        type: string
      role:
        enum:
        - user
        - admin
        example: admin
        type: string
      timezone:
        example: America/New_York
        type: string
    type: object
  dto.UserIDResponse:
    properties:
      user_id:
        example: 1
        type: integer
    type: object
  dto.UserResponse:
    properties:
      created_at:
        description: ISO 8601 format
        example: "2024-01-10T08:00:00Z"
        type: string
      email:
        example: john.doe@example.com
        type: string
      id:
        example: 1
        type: integer
      language_code:
        example: en
        type: string
      name:
        example: John Doe
        type: string
      role:
        enum:
        - user
        - admin
        example: user
        type: string
      timezone:
        example: UTC
        type: string
    type: object
info:
  contact: {}
paths:
  /api/v1/backlogs:
    get:
      description: Retrieves all backlog items with pagination, ordering, and filtering
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 50
        description: Page size
        in: query
        name: page_size
        type: integer
      - default: created_at DESC
        description: Order by
        in: query
        name: order_by
        type: string
      - description: Filter by user ID
        in: query
        name: user_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated backlogs
          schema:
            $ref: '#/definitions/dto.PaginatedBacklogsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get all backlog items
      tags:
      - Backlogs
    post:
      consumes:
      - application/json
      description: Creates a new backlog item and associates it with a user
      parameters:
      - description: Backlog to create
        in: body
        name: backlog
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBacklogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created backlog ID
          schema:
            $ref: '#/definitions/dto.CreateResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create a new backlog item
      tags:
      - Backlogs
  /api/v1/backlogs/{id}:
    delete:
      description: Deletes a backlog item by its ID (soft delete)
      parameters:
      - description: Backlog ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Delete backlog item
      tags:
      - Backlogs
    get:
      description: Retrieves a backlog item by its ID
      parameters:
      - description: Backlog ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Backlog item
          schema:
            $ref: '#/definitions/dto.BacklogResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get backlog by ID
      tags:
      - Backlogs
    put:
      consumes:
      - application/json
      description: Updates a backlog item by its ID
      parameters:
      - description: Backlog ID
        in: path
        name: id
        required: true
        type: integer
      - description: Backlog update data
        in: body
        name: backlog
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateBacklogRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated backlog item
          schema:
            $ref: '#/definitions/dto.BacklogResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Update backlog item
      tags:
      - Backlogs
  /api/v1/backlogs/batch:
    post:
      consumes:
      - application/json
      description: Creates multiple backlog items from a batch string separated by
        separator
      parameters:
      - description: Batch backlog items to create
        in: body
        name: backlog
        required: true
        schema:
          $ref: '#/definitions/dto.CreateBacklogsBatchRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created backlog IDs
          schema:
            $ref: '#/definitions/dto.BatchCreateResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create multiple backlog items from batch
      tags:
      - Backlogs
  /api/v1/digests:
    get:
      description: Generates a digest for a user with statistics and tasks
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      - description: Messenger Related User ID
        in: query
        name: messenger_related_user_id
        type: integer
      - description: Filter by start_date from (RFC3339 format, inclusive)
        in: query
        name: start_date_from
        type: string
      - description: Filter by start_date to (RFC3339 format, inclusive)
        in: query
        name: start_date_to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Digest data
          schema:
            $ref: '#/definitions/dto.DigestResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get digest
      tags:
      - Digests
  /api/v1/digests/settings:
    delete:
      description: Deletes digest settings for a user
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      - description: Messenger Related User ID
        in: query
        name: messenger_related_user_id
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Delete digest settings
      tags:
      - Digests
    get:
      description: Retrieves digest settings for a user
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      - description: Messenger Related User ID
        in: query
        name: messenger_related_user_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Digest settings
          schema:
            $ref: '#/definitions/dto.DigestSettingsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Get digest settings
      tags:
      - Digests
    post:
      consumes:
      - application/json
      description: Creates new digest settings for a user
      parameters:
      - description: Digest settings to create
        in: body
        name: settings
        required: true
        schema:
          $ref: '#/definitions/dto.CreateDigestSettingsRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created digest settings ID
          schema:
            $ref: '#/definitions/dto.CreateResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      summary: Create digest settings
      tags:
      - Digests
    put:
      consumes:
      - application/json
      description: Updates digest settings for a user
      parameters:
      - description: User ID
        in: query
        name: user_id
        required: true
        type: integer
      - description: Messenger Related User ID
        in: query
        name: messenger_related_user_id
        type: integer
      - description: Digest settings update data
        in: body
        name: settings
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateDigestSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Updated digest settings
          schema:
            $ref: '#/definitions/dto.DigestSettingsResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: Not found
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "422":
          description: Unprocessable entity
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
