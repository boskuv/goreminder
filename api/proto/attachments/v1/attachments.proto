syntax = "proto3";

package attachments.v1;

option go_package = "github.com/boskuv/goreminder/api/gen/attachments/v1;attachmentsv1";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service AttachmentService {
  rpc InitUpload(InitUploadRequest) returns (InitUploadResponse);
  rpc UploadDirect(UploadDirectRequest) returns (Attachment);
  rpc CompleteUpload(CompleteUploadRequest) returns (Attachment);
  rpc ListAttachments(ListAttachmentsRequest) returns (ListAttachmentsResponse);
  rpc GetDownloadURL(GetDownloadURLRequest) returns (GetDownloadURLResponse);
  rpc DownloadDirect(DownloadDirectRequest) returns (DownloadDirectResponse);
  rpc DeleteAttachment(DeleteAttachmentRequest) returns (google.protobuf.Empty);
  rpc PurgeByTask(PurgeByTaskRequest) returns (PurgeResponse);
  rpc PurgeByUser(PurgeByUserRequest) returns (PurgeResponse);
}

message Attachment {
  string id = 1;
  int64 task_id = 2;
  int64 user_id = 3;
  string original_name = 4;
  string content_type = 5;
  int64 size_bytes = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
}

message InitUploadRequest {
  int64 task_id = 1;
  int64 user_id = 2;
  string original_name = 3;
  string content_type = 4;
  int64 size_bytes = 5;
  string idempotency_key = 6;
}

message UploadDirectRequest {
  int64 task_id = 1;
  int64 user_id = 2;
  string original_name = 3;
  string content_type = 4;
  bytes data = 5;
  string idempotency_key = 6;
}

message InitUploadResponse {
  string attachment_id = 1;
  int64 task_id = 2;
  string status = 3;
  string upload_url = 4;
  google.protobuf.Timestamp expires_at = 5;
  map<string, string> required_headers = 6;
}

message CompleteUploadRequest {
  int64 task_id = 1;
  string attachment_id = 2;
}

message ListAttachmentsRequest {
  int64 task_id = 1;
}

message ListAttachmentsResponse {
  repeated Attachment attachments = 1;
}

message GetDownloadURLRequest {
  int64 task_id = 1;
  string attachment_id = 2;
}

message GetDownloadURLResponse {
  string download_url = 1;
  google.protobuf.Timestamp expires_at = 2;
}

message DownloadDirectRequest {
  int64 task_id = 1;
  string attachment_id = 2;
}

message DownloadDirectResponse {
  bytes data = 1;
  string content_type = 2;
  string original_name = 3;
  int64 size_bytes = 4;
}

message DeleteAttachmentRequest {
  int64 task_id = 1;
  string attachment_id = 2;
}

message PurgeByTaskRequest {
  int64 task_id = 1;
  repeated int64 child_task_ids = 2;
}

message PurgeByUserRequest {
  int64 user_id = 1;
}

message PurgeResponse {
  int32 purged_count = 1;
}
